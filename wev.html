<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>اتصال Phantom - dApp على Solana</title>
    <!-- إضافة خطوط جميلة وتصميم عصري -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (مجاني) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
        }

        /* حاوية البطاقة الرئيسية */
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 28px 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c084fc, #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .sub {
            text-align: center;
            color: #cad2ff;
            margin-bottom: 32px;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.9;
        }

        /* قسم حالة المحفظة */
        .wallet-status {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid rgba(165, 180, 252, 0.3);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #1e1a3b;
            padding: 8px 18px;
            border-radius: 40px;
            margin-bottom: 14px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #6b7280;
            box-shadow: 0 0 4px currentColor;
        }

        .led.green {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .led.red {
            background: #ef4444;
            box-shadow: 0 0 6px #ef4444;
        }

        .address-box {
            background: #0b0a1a;
            padding: 12px 16px;
            border-radius: 32px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #cbd5ff;
            word-break: break-all;
            border: 1px solid #2d2a5e;
            margin: 12px 0;
        }

        .copy-btn {
            background: none;
            border: none;
            color: #a78bfa;
            font-size: 1rem;
            cursor: pointer;
            margin-right: 8px;
            transition: 0.2s;
        }

        .copy-btn:hover {
            color: #c4b5fd;
            transform: scale(1.05);
        }

        /* الأزرار */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 24px 0 20px;
        }

        .btn {
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 24px;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            transition: 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #2d2a5e;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(95deg, #9945FF, #14F195);
            color: white;
            font-weight: 800;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 12px 20px -8px #9945ff70;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #a78bfa;
            color: #e0d9ff;
        }

        .btn-outline:hover {
            background: rgba(167, 139, 250, 0.2);
            border-color: #c4b5fd;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #f87171;
            color: #ffc4c4;
        }

        .btn-danger:hover {
            background: #dc262630;
            border-color: #ff8a8a;
        }

        /* معلومات الشبكة والتوكن */
        .network-info {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 28px;
            padding: 18px;
            margin-top: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
            padding: 6px 0;
            border-bottom: 1px dashed #3b3670;
        }

        .info-label {
            font-weight: 600;
            color: #b9c2ff;
        }

        .info-value {
            font-family: monospace;
            font-weight: 500;
            color: #f0eefc;
        }

        .sol-balance {
            font-size: 1.1rem;
            font-weight: 800;
            background: #00000040;
            padding: 8px 12px;
            border-radius: 32px;
            text-align: center;
        }

        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.7rem;
            color: #7c7fba;
        }

        i {
            pointer-events: none;
        }

        button:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            .container {
                padding: 22px 18px;
            }
            .btn {
                padding: 10px 18px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fab fa-phantom" style="margin-left: 8px;"></i> Phantom dApp</h1>
    <div class="sub">تواصل مع محفظتك اللامركزية على Solana</div>

    <!-- قسم حالة المحفظة -->
    <div class="wallet-status" id="walletStatusSection">
        <div class="status-badge" id="statusBadge">
            <span class="led red" id="ledIndicator"></span>
            <span id="connectionText">غير متصل</span>
        </div>
        <div id="walletDetails" style="display: none;">
            <div class="address-box">
                <span id="walletAddress">...</span>
                <button class="copy-btn" id="copyAddressBtn" aria-label="نسخ العنوان"><i class="far fa-copy"></i></button>
            </div>
        </div>
        <div id="notInstalledMsg" style="display: none; color: #ffccaa; background: #aa2e2e30; padding: 10px; border-radius: 28px; margin-top: 6px;">
            <i class="fas fa-exclamation-triangle"></i> محفظة Phantom غير مثبتة. يرجى تثبيت الإضافة من متجر Chrome.
        </div>
    </div>

    <!-- الأزرار التفاعلية -->
    <div class="btn-group">
        <button class="btn btn-primary" id="connectBtn"><i class="fas fa-link"></i> اتصل بالمحفظة</button>
        <button class="btn btn-outline" id="disconnectBtn" disabled><i class="fas fa-unlink"></i> قطع الاتصال</button>
    </div>
    <div class="btn-group">
        <button class="btn btn-outline" id="refreshBalanceBtn" disabled><i class="fas fa-coins"></i> تحديث الرصيد</button>
        <button class="btn btn-outline" id="signMsgBtn" disabled><i class="fas fa-signature"></i> توقيع رسالة تجريبية</button>
    </div>

    <!-- معلومات الشبكة والرصيد -->
    <div class="network-info" id="networkInfo">
        <div class="info-row">
            <span class="info-label"><i class="fas fa-globe"></i> الشبكة الحالية:</span>
            <span class="info-value" id="networkName">—</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-coins"></i> رصيد SOL:</span>
            <span class="info-value sol-balance" id="solBalance">0.00 SOL</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-fingerprint"></i> الحالة:</span>
            <span class="info-value" id="connectionDetail">في انتظار الاتصال</span>
        </div>
    </div>

    <footer>
        <i class="fas fa-shield-alt"></i> تفاعل آمن مع شبكة Solana | Phantom Wallet
    </footer>
</div>

<script>
    // التحقق من وجود phantom في window
    // مرجع الكائن العام للمحفظة
    let provider = null;
    let connectedPublicKey = null;
    let currentSolBalance = 0;

    // عناصر DOM
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const refreshBalanceBtn = document.getElementById('refreshBalanceBtn');
    const signMsgBtn = document.getElementById('signMsgBtn');
    const connectionTextSpan = document.getElementById('connectionText');
    const ledIndicator = document.getElementById('ledIndicator');
    const walletDetailsDiv = document.getElementById('walletDetails');
    const walletAddressSpan = document.getElementById('walletAddress');
    const copyAddressBtn = document.getElementById('copyAddressBtn');
    const notInstalledMsg = document.getElementById('notInstalledMsg');
    const networkNameSpan = document.getElementById('networkName');
    const solBalanceSpan = document.getElementById('solBalance');
    const connectionDetailSpan = document.getElementById('connectionDetail');

    // تحديث واجهة المستخدم بناءً على حالة الاتصال
    function updateUI(isConnected, address = null, balance = null) {
        if (isConnected && address) {
            // متصل
            connectionTextSpan.innerText = 'متصل';
            ledIndicator.className = 'led green';
            walletDetailsDiv.style.display = 'block';
            walletAddressSpan.innerText = shortenAddress(address);
            walletAddressSpan.setAttribute('data-full-address', address);
            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
            refreshBalanceBtn.disabled = false;
            signMsgBtn.disabled = false;
            connectionDetailSpan.innerText = 'المحفظة متصلة وجاهزة';
            if (balance !== null && balance !== undefined) {
                currentSolBalance = balance;
                solBalanceSpan.innerText = `${balance.toFixed(4)} SOL`;
            } else {
                // لو ما عندنا رصيد نجلبها
                fetchSolBalance(address);
            }
        } else {
            // غير متصل
            connectionTextSpan.innerText = 'غير متصل';
            ledIndicator.className = 'led red';
            walletDetailsDiv.style.display = 'none';
            walletAddressSpan.innerText = '';
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            refreshBalanceBtn.disabled = true;
            signMsgBtn.disabled = true;
            connectionDetailSpan.innerText = 'الرجاء الاتصال بالمحفظة';
            solBalanceSpan.innerText = '0.00 SOL';
            currentSolBalance = 0;
            networkNameSpan.innerText = '—';
            connectedPublicKey = null;
        }
    }

    // اختصار العنوان
    function shortenAddress(address) {
        if (!address) return '';
        return address.slice(0, 4) + '...' + address.slice(-4);
    }

    // جلب رصيد SOL باستخدام الـ connection provider (Phantom)
    async function fetchSolBalance(publicKeyStr) {
        if (!provider || !publicKeyStr) return 0;
        try {
            // الاتصال من خلال phantom's provider (الذي هو window.solana)
            const connection = provider.connection;
            if (!connection) {
                // بعض الإصدارات تحتاج لإنشاء Connection يدويًا، لكن window.solana يوفر أحيانًا .connection
                // إذا لم يوجد .connection نستخدم API Solana Web3 لكن بدون المكتبة سنحاول استخدام RPC افتراضي.
                // للتبسيط نستخدم fetch JSON-RPC إذا كان provider لا يعطي connection جاهز.
                // ولكن أغلب الإصدارات الحديثة تدعم provider.connection.
                // بديل سريع: استخدام RPC endpoint.
                const rpcUrl = 'https://api.mainnet-beta.solana.com';
                const response = await fetch(rpcUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: '2.0',
                        id: 1,
                        method: 'getBalance',
                        params: [publicKeyStr]
                    })
                });
                const data = await response.json();
                if (data.result && typeof data.result.value !== 'undefined') {
                    const lamports = data.result.value;
                    const sol = lamports / 1e9;
                    currentSolBalance = sol;
                    solBalanceSpan.innerText = `${sol.toFixed(4)} SOL`;
                    return sol;
                }
                throw new Error('لا يمكن جلب الرصيد');
            } else {
                const balanceLamports = await connection.getBalance(publicKeyStr);
                const sol = balanceLamports / 1e9;
                currentSolBalance = sol;
                solBalanceSpan.innerText = `${sol.toFixed(4)} SOL`;
                return sol;
            }
        } catch (err) {
            console.error('خطأ في جلب الرصيد:', err);
            connectionDetailSpan.innerText = 'خطأ في تحديث الرصيد';
            solBalanceSpan.innerText = '? SOL';
            return 0;
        }
    }

    // جلب الشبكة الحالية (من phantom)
    async function getNetwork() {
        if (provider && provider.isPhantom) {
            try {
                // قد تكون الخاصية موجودة في provider
                const network = provider?.networkVersion || provider?._network || (await provider.request({ method: 'network' })?.catch(()=>null));
                if (network && typeof network === 'string') {
                    networkNameSpan.innerText = network === 'mainnet-beta' ? 'Mainnet Beta' : (network || 'Devnet/Testnet');
                } else if (network && network.name) {
                    networkNameSpan.innerText = network.name;
                } else {
                    // حل آخر: استخدام getNetwork معلومات
                    const resp = await provider.request({ method: 'network' });
                    if (resp && resp.name) networkNameSpan.innerText = resp.name;
                    else networkNameSpan.innerText = 'Solana Mainnet/Dev?';
                }
            } catch (e) {
                networkNameSpan.innerText = 'Solana (غير معروف)';
            }
        } else {
            networkNameSpan.innerText = 'غير متاح';
        }
    }

    // حدث الاتصال بالمحفظة
    async function connectWallet() {
        if (!provider) {
            notInstalledMsg.style.display = 'block';
            connectionDetailSpan.innerText = 'محفظة Phantom غير موجودة';
            return;
        }
        try {
            connectionDetailSpan.innerText = 'جاري الاتصال...';
            const resp = await provider.connect();
            connectedPublicKey = resp.publicKey.toString();
            // تخزين المفتاح العام
            await updateUI(true, connectedPublicKey);
            await fetchSolBalance(connectedPublicKey);
            await getNetwork();
            connectionDetailSpan.innerText = '✅ متصل بنجاح عبر Phantom';
            // تسجيل حدث تغيير الحساب أو الشبكة
            setupEventListeners();
        } catch (err) {
            console.error('فشل الاتصال:', err);
            connectionDetailSpan.innerText = `فشل الاتصال: ${err.message || 'رفض المستخدم'}`;
            updateUI(false);
        }
    }

    // قطع الاتصال
    async function disconnectWallet() {
        if (provider && provider.disconnect) {
            try {
                await provider.disconnect();
            } catch(e) { console.warn(e); }
        }
        connectedPublicKey = null;
        updateUI(false);
        connectionDetailSpan.innerText = 'تم قطع الاتصال بنجاح';
        networkNameSpan.innerText = '—';
        currentSolBalance = 0;
    }

    // توقيع رسالة تجريبية لإثبات التحكم بالمحفظة
    async function signTestMessage() {
        if (!provider || !connectedPublicKey) {
            connectionDetailSpan.innerText = 'لا توجد محفظة متصلة';
            return;
        }
        const message = `مرحباً من dApp على فانتوم\nالوقت: ${new Date().toISOString()}\nأنا أوافق على تسجيل الدخول.\nNonce: ${Math.floor(Math.random() * 1000000)}`;
        const encodedMessage = new TextEncoder().encode(message);
        try {
            const signed = await provider.signMessage(encodedMessage, "utf8");
            // signed.signature متوفر
            const signature = signed.signature;
            const signatureHex = Buffer.from(signature).toString('hex').slice(0, 24);
            connectionDetailSpan.innerText = `✓ تم التوقيع! التجزئة: ${signatureHex}...`;
            // عرض رسالة نجاح منبثقة خفيفة
            alert(`تم توقيع الرسالة بنجاح!\n\nالرسالة:\n${message}\n\nالتوقيع (جزء): ${signatureHex}...`);
        } catch (err) {
            console.error(err);
            connectionDetailSpan.innerText = `فشل التوقيع: ${err.message}`;
            alert(`فشل التوقيع: ${err.message || 'خطأ غير معروف'}`);
        }
    }

    // إعادة تحديث الرصيد يدويًا
    async function refreshBalanceManually() {
        if (!connectedPublicKey) {
            connectionDetailSpan.innerText = 'المحفظة غير متصلة';
            return;
        }
        connectionDetailSpan.innerText = 'جاري تحديث الرصيد...';
        await fetchSolBalance(connectedPublicKey);
        connectionDetailSpan.innerText = 'تم تحديث الرصيد';
        setTimeout(() => {
            if (connectedPublicKey) connectionDetailSpan.innerText = 'المحفظة متصلة وجاهزة';
            else connectionDetailSpan.innerText = 'غير متصل';
        }, 1800);
    }

    // إعداد مستمعي الأحداث من phantom (حالة تغيير الحساب أو الشبكة)
    function setupEventListeners() {
        if (!provider) return;
        // إزالة المستمعات القديمة إن وجدت لمنع التكرار
        provider.removeAllListeners?.('connect');
        provider.removeAllListeners?.('disconnect');
        provider.removeAllListeners?.('accountChanged');
        provider.removeAllListeners?.('networkChanged');

        provider.on('connect', () => {
            console.log('Phantom connect event');
            if (provider.publicKey) {
                connectedPublicKey = provider.publicKey.toString();
                updateUI(true, connectedPublicKey);
                fetchSolBalance(connectedPublicKey);
                getNetwork();
            }
        });
        provider.on('disconnect', () => {
            console.log('Phantom disconnect event');
            updateUI(false);
        });
        provider.on('accountChanged', async (newPublicKey) => {
            if (newPublicKey) {
                connectedPublicKey = newPublicKey.toString();
                updateUI(true, connectedPublicKey);
                await fetchSolBalance(connectedPublicKey);
                await getNetwork();
                connectionDetailSpan.innerText = 'تم تغيير الحساب';
            } else {
                updateUI(false);
            }
        });
        provider.on('networkChanged', (newNetwork) => {
            getNetwork();
            if (connectedPublicKey) fetchSolBalance(connectedPublicKey);
            connectionDetailSpan.innerText = 'تغيرت الشبكة، تم التحديث';
        });
    }

    // تهيئة المحفظة والتحقق من تثبيت Phantom
    function initPhantom() {
        // معظم المتصفحات: window.solana هو كائن phantom
        if (window.solana && window.solana.isPhantom) {
            provider = window.solana;
            notInstalledMsg.style.display = 'none';
            // تحقق مما إذا كانت المحفظة متصلة مسبقًا
            if (provider.isConnected && provider.publicKey) {
                connectedPublicKey = provider.publicKey.toString();
                updateUI(true, connectedPublicKey);
                fetchSolBalance(connectedPublicKey);
                getNetwork();
                setupEventListeners();
            } else {
                updateUI(false);
                // نجهز المستمعين لحدث الاتصال التلقائي عندما يتصل لاحقًا
                setupEventListeners();
            }
        } else if (window.solana && window.solana.provider && window.solana.provider.isPhantom) {
            // بعض الإصدارات
            provider = window.solana.provider;
            notInstalledMsg.style.display = 'none';
            if (provider.isConnected && provider.publicKey) {
                connectedPublicKey = provider.publicKey.toString();
                updateUI(true, connectedPublicKey);
                fetchSolBalance(connectedPublicKey);
                getNetwork();
                setupEventListeners();
            } else {
                updateUI(false);
                setupEventListeners();
            }
        } else {
            // phantom غير موجود
            provider = null;
            notInstalledMsg.style.display = 'block';
            updateUI(false);
            connectionDetailSpan.innerText = 'برجاء تثبيت محفظة Phantom';
        }
    }

    // نسخ العنوان إلى الحافظة
    copyAddressBtn.addEventListener('click', () => {
        const fullAddress = walletAddressSpan.getAttribute('data-full-address');
        if (fullAddress) {
            navigator.clipboard.writeText(fullAddress).then(() => {
                connectionDetailSpan.innerText = 'تم نسخ العنوان!';
                setTimeout(() => {
                    if (connectedPublicKey) connectionDetailSpan.innerText = 'المحفظة متصلة وجاهزة';
                    else connectionDetailSpan.innerText = 'غير متصل';
                }, 1500);
            }).catch(() => {
                alert('تعذر النسخ');
            });
        } else {
            alert('لا يوجد عنوان للنسخ');
        }
    });

    // ربط الأزرار
    connectBtn.addEventListener('click', connectWallet);
    disconnectBtn.addEventListener('click', disconnectWallet);
    refreshBalanceBtn.addEventListener('click', refreshBalanceManually);
    signMsgBtn.addEventListener('click', signTestMessage);

    // بدء التطبيق
    initPhantom();

    // إضافة كشف إضافي لـ window load للتأكد من عدم فوت phantom بعد تحميل الصفحة
    window.addEventListener('load', () => {
        if (!provider && window.solana && window.solana.isPhantom) {
            initPhantom();
        }
    });
</script>
</body>
</html>
