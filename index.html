<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الدفع عبر Phantom | Solana Pay</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
        }

        .sub {
            text-align: center;
            color: #a78bfa;
            margin-bottom: 30px;
        }

        .wallet-card {
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1e1a3b;
            padding: 6px 16px;
            border-radius: 40px;
            margin-bottom: 15px;
            color: white;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.red { background: #ef4444; }
        .dot.green { background: #10b981; }

        .address-box {
            background: #0b0a1a;
            padding: 12px;
            border-radius: 20px;
            font-family: monospace;
            color: #cbd5ff;
            word-break: break-all;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary { background: linear-gradient(95deg, #9945FF, #14F195); color: white; }
        .btn-outline { background: transparent; border: 1px solid #a78bfa; color: white; }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🦄 متجر SOL</h1>
    <div class="sub">ادفع باستخدام محفظة Phantom</div>

    <div class="wallet-card">
        <div class="status-badge">
            <span class="dot red" id="statusDot"></span>
            <span id="statusText">غير متصل</span>
        </div>

        <div id="walletInfo" style="display:none;">
            <div class="address-box" id="walletAddress"></div>
        </div>
    </div>

    <div class="info-row">
        <span>السعر</span>
        <span>0.05 SOL</span>
    </div>

    <input id="email" placeholder="البريد الإلكتروني"
           style="width:100%;padding:12px;border-radius:20px;margin-top:10px;border:none;">

    <button class="btn btn-primary" id="payBtn" disabled>💸 دفع</button>
    <button class="btn btn-outline" id="connectBtn">🔗 ربط المحفظة</button>
</div>

<script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    let provider = null;
    let wallet = null;

    const MERCHANT_WALLET = "DjDZfRk6rNpkgVMyjWjQab6dbXo5BVpLvQmzMvM7tP7u";

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const walletInfo = document.getElementById("walletInfo");
    const walletAddress = document.getElementById("walletAddress");
    const payBtn = document.getElementById("payBtn");

    function updateUI(connected, addr) {
        if (connected) {
            statusDot.className = "dot green";
            statusText.innerText = "متصل";
            walletInfo.style.display = "block";
            walletAddress.innerText = addr;
            payBtn.disabled = false;
        } else {
            statusDot.className = "dot red";
            statusText.innerText = "غير متصل";
            walletInfo.style.display = "none";
            payBtn.disabled = true;
        }
    }

    async function connectWallet() {
        try {
            if (!window.solana || !window.solana.isPhantom) {
                alert("قم بتثبيت Phantom أولاً");
                return;
            }

            provider = window.solana;
            const res = await provider.connect();
            wallet = res.publicKey.toString();

            updateUI(true, wallet);

        } catch (e) {
            alert("فشل الاتصال");
            console.log(e);
        }
    }

    async function pay() {
        if (!provider || !wallet) return alert("اربط المحفظة أولاً");

        const conn = new solanaWeb3.Connection(
            solanaWeb3.clusterApiUrl("devnet"),
            "confirmed"
        );

        const tx = new solanaWeb3.Transaction().add(
            solanaWeb3.SystemProgram.transfer({
                fromPubkey: new solanaWeb3.PublicKey(wallet),
                toPubkey: new solanaWeb3.PublicKey(MERCHANT_WALLET),
                lamports: 0.05 * 1e9
            })
        );

        const blockhash = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash.blockhash;
        tx.feePayer = new solanaWeb3.PublicKey(wallet);

        const signed = await provider.signAndSendTransaction(tx);
        alert("تم الدفع: " + signed.signature);
    }

    document.getElementById("connectBtn").onclick = connectWallet;
    document.getElementById("payBtn").onclick = pay;

    updateUI(false);
});
</script>

</body>
</html>
