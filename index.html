<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Phantom dApp - اتصال تلقائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 35px 25px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c084fc, #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .sub {
            color: #cad2ff;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .status-card {
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #1e1a3b;
            padding: 8px 20px;
            border-radius: 40px;
            margin-bottom: 15px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
        .dot.green { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .dot.yellow { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .address-box {
            background: #0b0a1a;
            padding: 12px 16px;
            border-radius: 32px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #cbd5ff;
            word-break: break-all;
            margin-top: 10px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #3b3670;
            color: #e0d9ff;
        }
        .info-label { font-weight: 600; color: #b9c2ff; }
        .balance {
            font-size: 1.2rem;
            font-weight: 800;
            color: #14F195;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.65rem;
            color: #7c7fba;
        }
        button {
            background: linear-gradient(95deg, #9945FF, #14F195);
            border: none;
            padding: 14px 25px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
<div class="container">
    <h1>🦄 Phantom dApp</h1>
    <div class="sub">تواصل مع محفظتك على Solana</div>

    <div class="status-card">
        <div class="badge">
            <span class="dot red" id="statusDot"></span>
            <span id="statusText">جاري التحقق...</span>
        </div>
        <div id="walletInfo" style="display:none;">
            <div class="address-box">
                <span id="walletAddress"></span>
            </div>
        </div>
        <div id="loadingMsg" style="display:none;">
            <span class="loading"></span> <span id="loadingText">جاري الاتصال...</span>
        </div>
    </div>

    <div class="info-row">
        <span class="info-label">🌐 الشبكة</span>
        <span id="networkName">—</span>
    </div>
    <div class="info-row">
        <span class="info-label">💰 رصيد SOL</span>
        <span class="balance" id="solBalance">0.00 SOL</span>
    </div>
    <div class="info-row">
        <span class="info-label">📱 الحالة</span>
        <span id="statusDetail">✋ انتظر...</span>
    </div>

    <button id="retryBtn" style="display:none;">🔄 إعادة المحاولة</button>

    <footer>
        <i class="fas fa-shield-alt"></i> المتصفح المدمج في Phantom يعمل تلقائياً
    </footer>
</div>

<script>
    // عناصر DOM
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const walletInfo = document.getElementById('walletInfo');
    const walletAddressSpan = document.getElementById('walletAddress');
    const loadingMsg = document.getElementById('loadingMsg');
    const networkNameSpan = document.getElementById('networkName');
    const solBalanceSpan = document.getElementById('solBalance');
    const statusDetailSpan = document.getElementById('statusDetail');
    const retryBtn = document.getElementById('retryBtn');

    let currentAddress = null;
    let provider = null;

    function shortenAddress(addr) {
        if (!addr) return '';
        return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    async function fetchBalance(address) {
        try {
            const response = await fetch('https://api.mainnet-beta.solana.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    jsonrpc: '2.0',
                    id: 1,
                    method: 'getBalance',
                    params: [address]
                })
            });
            const data = await response.json();
            if (data.result && data.result.value !== undefined) {
                const sol = data.result.value / 1e9;
                solBalanceSpan.innerHTML = `${sol.toFixed(5)} SOL`;
                return sol;
            }
        } catch (err) {
            console.error('خطأ في الرصيد:', err);
        }
        solBalanceSpan.innerHTML = '? SOL';
        return 0;
    }

    function setConnected(address) {
        currentAddress = address;
        statusDot.className = 'dot green';
        statusText.innerText = '✅ متصل';
        walletInfo.style.display = 'block';
        loadingMsg.style.display = 'none';
        walletAddressSpan.innerText = shortenAddress(address);
        walletAddressSpan.setAttribute('data-full', address);
        networkNameSpan.innerText = 'Solana Mainnet';
        statusDetailSpan.innerText = 'المحفظة متصلة وجاهزة';
        retryBtn.style.display = 'none';
        
        // جلب الرصيد
        fetchBalance(address);
    }

    function setDisconnected(message = 'غير متصل') {
        currentAddress = null;
        statusDot.className = 'dot red';
        statusText.innerText = '❌ غير متصل';
        walletInfo.style.display = 'none';
        loadingMsg.style.display = 'none';
        networkNameSpan.innerText = '—';
        solBalanceSpan.innerHTML = '0.00 SOL';
        statusDetailSpan.innerText = message;
        retryBtn.style.display = 'block';
    }

    function setLoading(message = 'جاري الاتصال بـ Phantom...') {
        statusDot.className = 'dot yellow';
        statusText.innerText = 'جاري الاتصال';
        walletInfo.style.display = 'none';
        loadingMsg.style.display = 'block';
        statusDetailSpan.innerText = message;
    }

    // المحاولة التلقائية للاتصال
    async function autoConnect() {
        // التحقق من وجود Phantom
        const phantomProvider = window.solana || (window.phantom?.solana);
        
        if (!phantomProvider || !phantomProvider.isPhantom) {
            setDisconnected('⚠️ يرجى فتح الموقع من داخل تطبيق Phantom');
            statusDetailSpan.innerHTML = '📱 افتح تطبيق Phantom ثم المتصفح المدمج';
            return false;
        }

        provider = phantomProvider;
        
        // التحقق إذا كان متصلاً مسبقاً
        if (provider.isConnected && provider.publicKey) {
            const address = provider.publicKey.toString();
            setConnected(address);
            return true;
        }
        
        // محاولة الاتصال
        setLoading('⏳ يرجى الموافقة في نافذة Phantom...');
        
        try {
            const response = await provider.connect();
            const address = response.publicKey.toString();
            setConnected(address);
            
            // إضافة مستمعين للأحداث
            provider.on('accountChanged', (newPublicKey) => {
                if (newPublicKey) {
                    setConnected(newPublicKey.toString());
                } else {
                    setDisconnected('تم تغيير الحساب');
                }
            });
            
            provider.on('disconnect', () => {
                setDisconnected('تم قطع الاتصال');
            });
            
            return true;
        } catch (err) {
            console.error('خطأ:', err);
            if (err.code === 4001) {
                setDisconnected('❌ تم رفض الاتصال - اضغط إعادة المحاولة');
            } else {
                setDisconnected('❌ فشل الاتصال: ' + err.message);
            }
            return false;
        }
    }

    // إعادة المحاولة
    function retryConnect() {
        autoConnect();
    }

    // مستمع الزر
    retryBtn.addEventListener('click', retryConnect);

    // بدء التشغيل التلقائي
    window.addEventListener('load', () => {
        setTimeout(autoConnect, 500);
    });

    // أيضاً نحاول بعد ثانية للتأكد
    setTimeout(autoConnect, 1500);
</script>
</body>
</html>
