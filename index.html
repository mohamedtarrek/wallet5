<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Phantom dApp - اتصل الآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px 25px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #cad2ff;
            margin: 10px 0 25px;
        }
        .status-card {
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1e1a3b;
            padding: 6px 16px;
            border-radius: 40px;
            margin-bottom: 12px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.red { background: #ef4444; }
        .dot.green { background: #10b981; box-shadow: 0 0 6px #10b981; }
        .dot.yellow { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        .address {
            background: #0b0a1a;
            padding: 10px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #cbd5ff;
            word-break: break-all;
            margin-top: 10px;
        }
        button {
            font-family: 'Cairo', sans-serif;
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            background: linear-gradient(95deg, #9945FF, #14F195);
            color: white;
            cursor: pointer;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #3b3670;
            color: #e0d9ff;
        }
        .info-label { font-weight: 600; color: #b9c2ff; }
        .balance { font-size: 1.3rem; font-weight: 800; text-align: center; padding: 5px; }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.65rem;
            color: #7c7fba;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🟣 Phantom dApp</h1>
    <div class="sub">تواصل مع محفظتك اللامركزية</div>

    <div class="status-card">
        <div class="badge">
            <span class="dot red" id="statusDot"></span>
            <span id="statusText">غير متصل</span>
        </div>
        <div id="addressBox" style="display:none;">
            <div class="address" id="addressDisplay"></div>
        </div>
    </div>

    <button id="connectMainBtn">
        🔗 اتصال المحفظة
    </button>

    <div class="info-row">
        <span class="info-label">🌐 الشبكة:</span>
        <span id="networkInfo">—</span>
    </div>
    <div class="info-row">
        <span class="info-label">💰 رصيد SOL:</span>
        <span class="balance" id="balanceInfo">0.00 SOL</span>
    </div>
    <div class="info-row">
        <span class="info-label">📱 الحالة:</span>
        <span id="statusMsg">اضغط الزر للاتصال</span>
    </div>

    <footer>
        <i class="fas fa-shield-alt"></i> متوافق مع Phantom • اضغط لفتح المحفظة
    </footer>
</div>

<script>
    const connectBtn = document.getElementById('connectMainBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const addressBox = document.getElementById('addressBox');
    const addressDisplay = document.getElementById('addressDisplay');
    const networkInfoSpan = document.getElementById('networkInfo');
    const balanceInfoSpan = document.getElementById('balanceInfo');
    const statusMsgSpan = document.getElementById('statusMsg');

    let provider = null;
    let currentAddress = null;

    function shortenAddr(addr) {
        if (!addr) return '';
        return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    async function getBalance(address) {
        try {
            const res = await fetch('https://api.mainnet-beta.solana.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    jsonrpc: '2.0',
                    id: 1,
                    method: 'getBalance',
                    params: [address]
                })
            });
            const data = await res.json();
            if (data.result) {
                const sol = data.result.value / 1e9;
                balanceInfoSpan.innerHTML = `${sol.toFixed(5)} SOL`;
                return sol;
            }
        } catch(e) { console.log(e); }
        balanceInfoSpan.innerHTML = '? SOL';
        return 0;
    }

    function setConnected(addr) {
        currentAddress = addr;
        statusDot.className = 'dot green';
        statusText.innerText = '✅ متصل';
        addressBox.style.display = 'block';
        addressDisplay.innerText = shortenAddr(addr);
        addressDisplay.setAttribute('data-full', addr);
        connectBtn.innerHTML = '✅ المحفظة متصلة';
        connectBtn.disabled = true;
        statusMsgSpan.innerText = 'متصل وجاهز';
        networkInfoSpan.innerText = 'Solana Mainnet';
        getBalance(addr);
    }

    function setDisconnected() {
        currentAddress = null;
        statusDot.className = 'dot red';
        statusText.innerText = 'غير متصل';
        addressBox.style.display = 'none';
        addressDisplay.innerText = '';
        connectBtn.innerHTML = '🔗 اتصال المحفظة';
        connectBtn.disabled = false;
        statusMsgSpan.innerText = 'اضغط الزر للاتصال';
        networkInfoSpan.innerText = '—';
        balanceInfoSpan.innerHTML = '0.00 SOL';
    }

    function setLoading() {
        statusDot.className = 'dot yellow';
        statusText.innerText = 'جاري الاتصال...';
        statusMsgSpan.innerText = '⚠️ انتظر نافذة Phantom';
    }

    async function connectWallet() {
        // محاولة الحصول على Phantom من عدة أماكن
        const phantom = window.solana || (window.phantom?.solana);
        
        if (!phantom || !phantom.isPhantom) {
            statusMsgSpan.innerText = '❌ يرجى تثبيت Phantom أو فتح الموقع من داخل التطبيق';
            statusDot.className = 'dot red';
            alert('⚠️ يرجى فتح هذا الموقع من داخل متصفح تطبيق Phantom\n\nكيفية الاستخدام:\n1. افتح تطبيق Phantom\n2. اضغط على أيقونة المتصفح\n3. اكتب: https://mohamedtarrek.github.io/wallet5/');
            return;
        }

        provider = phantom;
        setLoading();

        try {
            // طلب الاتصال
            const response = await provider.connect();
            const address = response.publicKey.toString();
            setConnected(address);
            
            // مراقبة تغيير الحساب
            provider.on('accountChanged', (newPubkey) => {
                if (newPubkey) {
                    setConnected(newPubkey.toString());
                } else {
                    setDisconnected();
                }
            });
            
            provider.on('disconnect', () => {
                setDisconnected();
            });
            
        } catch (err) {
            console.error(err);
            setDisconnected();
            if (err.code === 4001) {
                statusMsgSpan.innerText = '❌ تم رفض الاتصال';
            } else {
                statusMsgSpan.innerText = '❌ فشل: ' + err.message;
            }
        }
    }

    // التحقق التلقائي عند التحميل
    async function init() {
        const phantom = window.solana || (window.phantom?.solana);
        if (phantom && phantom.isPhantom && phantom.isConnected && phantom.publicKey) {
            setConnected(phantom.publicKey.toString());
        } else {
            setDisconnected();
        }
    }

    connectBtn.addEventListener('click', connectWallet);
    init();
</script>
</body>
</html>
